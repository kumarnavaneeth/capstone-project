# DB
spring.datasource.url=jdbc:mysql://localhost:3306/admin_flight
spring.datasource.username=root
spring.datasource.password={cipher}ENCRYPTED_PASSWORD

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# SERVER
server.port=8081

# KAFKA
spring.kafka.bootstrap-servers=127.0.0.1:9092
spring.kafka.consumer.group-id=flight-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.flightapp.flight_service.dto.BookingEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# VALIDATION
spring.messages.basename=application
source.required=Source name is invalid
destination.required=Destination name is invalid
