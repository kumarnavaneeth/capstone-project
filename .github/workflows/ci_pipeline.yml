name: Backend CI

on:
  push:
    branches: [ "main", "dev", "feature/**" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  # Java services
  build-java-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [flight_service, ticket_service]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - run: mvn clean install

  # Node.js user_service
  build-user-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/user_service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/user_service/package-lock.json
      - run: npm install
      - run: npm test

  # Node.js api-gateway
  build-api-gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/api-gateway/package-lock.json
      - run: npm install
